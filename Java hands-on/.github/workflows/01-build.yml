name: 01-build

on:
  push:
    branches: [ main ]
 
jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Build with maven
      run: mvn clean install -DskipTests

      